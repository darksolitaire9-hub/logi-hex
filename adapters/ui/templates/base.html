<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>logi-hex</title>
        <script src="/static/js/htmx.min.js"></script>
        <link rel="stylesheet" href="/static/css/pico.min.css" />
    </head>
    <body>
        <header class="container-fluid">
            <nav>
                <ul>
                    <li>
                        <a href="/ui" class="header-brand">
                            📦 <strong>logi-hex</strong>
                        </a>
                    </li>
                </ul>
                <ul>
                    <li>
                        <a
                            href="/ui"
                            class="{% if request.url.path in ['/ui', '/ui/'] %}contrast{% endif %}"
                        >
                            Dashboard
                        </a>
                    </li>
                    <li>
                        <a
                            href="/ui/items/primary"
                            class="{% if request.url.path.startswith('/ui/items/primary') %}contrast{% endif %}"
                        >
                            {{ primary_category_name if primary_category_name is
                            defined else 'Primary items' }}
                        </a>
                    </li>
                    <li>
                        <a
                            href="/ui/items/content"
                            class="{% if request.url.path.startswith('/ui/items/content') %}contrast{% endif %}"
                        >
                            Content
                        </a>
                    </li>
                </ul>
            </nav>
        </header>

        <main class="container">{% block content %}{% endblock %}</main>

        <div id="modal-container"></div>

        <script>
            function closeModal() {
                const container = document.getElementById("modal-container");
                if (container) {
                    container.innerHTML = "";
                }
            }
            document.addEventListener("keydown", (e) => {
                if (e.key === "Escape") closeModal();
            });
        </script>
    </body>
</html>
