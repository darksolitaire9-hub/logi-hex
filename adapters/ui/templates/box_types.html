{% extends "base.html" %}
{% block content %}

<div class="card">
  <h2>Box Types</h2>

  <div id="box-types-list">
    {% include "partials/box_types_table.html" %}
  </div>

  <div style="margin-top:1.5rem; padding-top:1rem; border-top: 1px solid #f1f5f9;">
    <form
      hx-post="/ui/box-types/add"
      hx-target="#box-types-list"
      hx-swap="innerHTML"
      style="display:flex; gap:0.75rem; align-items:flex-end;"
    >
      <div class="field" style="flex:1; margin-bottom:0">
        <label>Box type name</label>
        <input
          type="text"
          name="label"
          placeholder="e.g. White Box"
          required
          autofocus
        />
      </div>
      <button type="submit" class="btn btn-primary">+ Add</button>
    </form>
  </div>
</div>

<div style="margin-top:0.5rem;">
  <a href="/ui" class="btn btn-ghost">← Back to dashboard</a>
</div>

{% endblock %}
