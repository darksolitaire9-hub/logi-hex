{% extends "base.html" %} {% block content %}
<section>
    <h2>Primary items</h2>
    <p>These are the main things you track balances for (e.g. box types).</p>

    <form hx-post="/api/items/add" hx-target="#items-table" hx-swap="innerHTML">
        <input type="hidden" name="category_id" value="{{ category_id }}" />
        <label for="new-item">
            Add a new {{ primary_category_name|lower|replace('types','type') }}
        </label>
        <input
            id="new-item"
            type="text"
            name="label"
            placeholder="e.g. White Box"
            required
        />
        <button type="submit">Add</button>
    </form>
</section>

<section>
    <h3>{{ primary_category_name }}</h3>
    <div id="items-table">{% include "partials/items_table.html" %}</div>
</section>
{% endblock %}
