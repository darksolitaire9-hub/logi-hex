{% extends "base.html" %} {% block content %}

<div class="card">
    {% if not category %}
    <h2>Secondary items</h2>
    <p style="color: #64748b; font-size: 0.95rem">
        No secondary category defined yet.
        <a href="/ui/setup" class="btn btn-primary" style="margin-left: 0.5rem"
            >Go to setup</a
        >
    </p>
    {% else %}
    <h2>{{ category.name }}</h2>

    <div id="items-list">{% include "partials/items_table.html" %}</div>

    <div
        style="
            margin-top: 1.5rem;
            padding-top: 1rem;
            border-top: 1px solid #f1f5f9;
        "
    >
        <form
            hx-post="/api/items/add"
            hx-target="#items-list"
            hx-swap="innerHTML"
            hx-on::after-request="this.reset()"
            style="display: flex; gap: 0.75rem; align-items: flex-end"
        >
            <input type="hidden" name="category_id" value="{{ category.id }}" />
            <div class="field" style="flex: 1; margin-bottom: 0">
                <label>New item</label>
                <input
                    type="text"
                    name="label"
                    placeholder="e.g. Salad"
                    required
                />
            </div>
            <button type="submit" class="btn btn-primary">+ Add</button>
        </form>
    </div>
    {% endif %}
</div>

<div style="margin-top: 0.5rem">
    <a href="/ui" class="btn btn-ghost">← Back to dashboard</a>
</div>

{% endblock %}
